<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Filtros Dinámicos</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="panel">
      <h3>Filtros</h3>
      <p id="conteo"></p>

      <!-- Paso 3: botones -->
      <button onclick="mostrarTodos()">Todos</button>
      <button onclick="filtrarEstrato(3)">Estrato ≥ 3</button>
      <button onclick="filtrarPoblacion(10000)">Población > 10.000</button>

      <!-- Paso 4: selector desplegable -->
      <select id="filtro-estrato" onchange="aplicarFiltroEstrato()">
        <option value="todos">Todos los estratos</option>
        <option value="1">Estrato 1</option>
        <option value="2">Estrato 2</option>
        <option value="3">Estrato 3</option>
        <option value="4">Estrato 4</option>
      </select>

      <!-- Paso 5: búsqueda por nombre -->
      <input
        type="text"
        id="buscar-barrio"
        placeholder="Buscar barrio..."
        oninput="buscarPorNombre(this.value)"
      />
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="app.js"></script>
  </body>
</html>
