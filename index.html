<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filtros Dinámicos</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="panel">
      <h3>Filtros</h3>
      <p id="conteo"></p>

      <!-- Botones rápidos -->
      <button onclick="mostrarTodos()">Todas las comunas</button>
      <button onclick="filtrarAreaGrande()">Área &gt; 3 km²</button>

      <!-- Filtro por rango de población -->
      <select id="filtro-poblacion" onchange="aplicarFiltroPoblacion()">
        <option value="todos">Todas las poblaciones</option>
        <option value="menor25">≤ 25.000 hab.</option>
        <option value="25a35">25.001 – 35.000 hab.</option>
        <option value="mayor35">&gt; 35.000 hab.</option>
      </select>

      <!-- Filtro de infraestructura por tipo -->
      <select id="filtro-tipo" onchange="aplicarFiltroTipo()">
        <option value="todos">Toda la infraestructura</option>
        <option value="Hospital">Hospitales</option>
        <option value="Universidad">Universidades</option>
        <option value="Colegio">Colegios</option>
        <option value="Edificio público">Edificios públicos</option>
        <option value="Parque">Parques</option>
      </select>

      <!-- Búsqueda por nombre de comuna -->
      <input
        type="text"
        id="buscar-comuna"
        placeholder="Buscar comuna..."
        oninput="buscarPorNombre(this.value)"
      />
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="app.js"></script>
  </body>
</html>
